services:
  # Redis - 不暴露到宿主机(服务器已有Redis,避免冲突)
  redis:
    image: redis:7-alpine
    container_name: autoclip-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API
  autoclip:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autoclip-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autoclip-celery-worker
    restart: unless-stopped
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    command: celery -A backend.core.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      autoclip:
        condition: service_healthy

  # Celery Beat
  celery-beat:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autoclip-celery-beat
    restart: unless-stopped
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    command: celery -A backend.core.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      autoclip:
        condition: service_healthy

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: autoclip-network
